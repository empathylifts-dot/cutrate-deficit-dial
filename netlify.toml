[build]
  publish = "deficit-dial"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/lead"
  to = "/.netlify/functions/submit-lead"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
